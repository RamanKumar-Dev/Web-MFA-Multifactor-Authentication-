<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal | Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            transition: transform 0.4s ease;
        }

        h2 { font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.5rem; color: #cbd5e1; }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
        }

        .toggle-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .toggle-link span {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }

        .hidden { display: none !important; }

        /* OTP Specific */
        .otp-input {
            letter-spacing: 0.8rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container" id="auth-card">
        
        <div id="register-view">
            <h2>Create Account</h2>
            <p>Join the secure gaming community</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleRegister()">Register</button>
            <div class="toggle-link">Already have an account? <span onclick="showView('login')">Sign In</span></div>
        </div>

        <div id="login-view" class="hidden">
            <h2>Welcome Back</h2>
            <p>Please enter your details</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="handleLogin()">Sign In</button>
            <div class="toggle-link">Don't have an account? <span onclick="showView('register')">Create One</span></div>
        </div>

        <div id="otp-view" class="hidden">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📱</div>
            <h2>Device Verify</h2>
            <p>Enter the 6-digit code sent to your terminal</p>
            <input type="text" id="otp-code" class="otp-input" maxlength="6" placeholder="000000">
            <button class="btn" onclick="handleVerify()">Verify & Play</button>
            <div class="toggle-link"><span onclick="location.reload()">Cancel</span></div>
        </div>

    </div>

    <script>
        function showView(view) {
            document.getElementById('register-view').classList.add('hidden');
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('otp-view').classList.add('hidden');
            document.getElementById(view + '-view').classList.remove('hidden');
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            alert(data.message);
            if(res.ok) showView('login');
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('tempId', data.userId);
                showView('otp');
            } else { alert(data.message); }
        }

        async function handleVerify() {
            const userId = localStorage.getItem('tempId');
            const token = document.getElementById('otp-code').value;
            const res = await fetch('/auth/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, token })
            });
            if(res.ok) window.location.href = 'dashboard.html';
            else alert("Invalid Code");
        }
    </script>
</body>
</html>
